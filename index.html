<!DOCTYPE html>
<html>
<head>
  <title>My Image</title>
  <style>
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      background: #ffffff;
      color: #000000;
      font-family: Arial, sans-serif;
    }

    .main-image {
      max-width: 100%;
      max-height: 80vh;
      margin-top: 20px;
    }

    .headline {
      font-size: 28px;
      font-weight: bold;
      text-align: center;
      margin-top: 30px;
    }

    .qr-container {
      display: flex;
      gap: 40px;
      margin-top: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .qr-box {
      text-align: center;
    }

    .qr-label {
      font-size: 18px;  /* increased size */
      font-weight: 600;
    }

    .qr-box img {
      width: 200px;
      height: auto;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <!-- Main image -->
  <img src="image.png" alt="Main image" class="main-image">

  <!-- Headline -->
  <div class="headline">
    Services offered in the Greater Toronto Area
  </div>

  <!-- QR Codes -->
  <div class="qr-container">
    <div class="qr-box">
      <div class="qr-label">Scan to text Laureta</div>
      <img src="laureta.png" alt="Laureta QR">
    </div>

    <div class="qr-box">
      <div class="qr-label">Scan to text Lenka</div>
      <img src="lenka.png" alt="Lenka QR">
    </div>
  </div>

</body>
</html>
